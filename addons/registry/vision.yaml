# Vision Pipeline Addon
#
# Provides object detection (YOLO), image classification (CLIP via transformers),
# and real-time streaming with cascade pipelines.
# Uses hardware acceleration when available (CUDA, Metal, CPU fallback).

name: vision
display_name: Vision Pipeline
description: Object detection, image classification, and real-time streaming with YOLO and CLIP
component: universal-runtime
version: "1.0.0"

packages:
  - ultralytics>=8.4.14
  - onnx>=1.12.0,<2.0.0
  - onnxslim>=0.1.85

# transformers is already a base dependency of universal-runtime (used for CLIP models)

hardware_notes:
  cuda: CUDA provides significant speedup for both YOLO detection and CLIP classification
  metal: Apple GPU (MPS) acceleration available for YOLO; CLIP uses MPS via transformers
  cpu: CPU works but is slower for real-time streaming
